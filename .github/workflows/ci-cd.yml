name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build -t naveenparihar0110/mean-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t naveenparihar0110/mean-frontend:latest ./frontend

      - name: Push Backend Image
        run: docker push naveenparihar0110/mean-backend:latest

      - name: Push Frontend Image
        run: docker push naveenparihar0110/mean-frontend:latest
